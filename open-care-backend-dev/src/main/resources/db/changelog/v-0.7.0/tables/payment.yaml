databaseChangeLog:
  - changeSet:
      id: payment-table
      author: claude
      changes:
        - createTable:
            tableName: payment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: razorpay_order_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: razorpay_payment_id
                  type: VARCHAR(100)
              - column:
                  name: razorpay_signature
                  type: VARCHAR(500)
              - column:
                  name: amount
                  type: NUMERIC(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(10)
                  defaultValue: "INR"
                  constraints:
                    nullable: false
              - column:
                  name: receipt
                  type: VARCHAR(100)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(20)
              - column:
                  name: entity_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: profile_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: razorpay_response
                  type: TEXT
              - column:
                  name: error_code
                  type: VARCHAR(100)
              - column:
                  name: error_description
                  type: TEXT
              - column:
                  name: refund_id
                  type: VARCHAR(100)
              - column:
                  name: refund_amount
                  type: NUMERIC(10, 2)
              - column:
                  name: refund_status
                  type: VARCHAR(50)
              - column:
                  name: paid_at
                  type: TIMESTAMP
              - column:
                  name: webhook_processed
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: payment
            baseColumnNames: profile_id
            referencedTableName: profile
            referencedColumnNames: id
            constraintName: fk_payment_profile
        - createIndex:
            tableName: payment
            indexName: idx_payment_order_id
            columns:
              - column:
                  name: razorpay_order_id
        - createIndex:
            tableName: payment
            indexName: idx_payment_payment_id
            columns:
              - column:
                  name: razorpay_payment_id
        - createIndex:
            tableName: payment
            indexName: idx_payment_entity
            columns:
              - column:
                  name: entity_type
              - column:
                  name: entity_id
