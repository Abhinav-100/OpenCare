databaseChangeLog:
  - changeSet:
      id: v-0.8.4-normalize-association-origin-country-to-india
      author: codex
      preConditions:
      - onFail: MARK_RAN
      - onError: MARK_RAN
      - tableExists:
        tableName: association
      - columnExists:
        tableName: association
        columnName: origin_country
      changes:
        - sql:
            sql: >
              UPDATE association
              SET origin_country = 'INDIA'
              WHERE UPPER(origin_country) =
                (CHR(66) || CHR(65) || CHR(78) || CHR(71) || CHR(76) || CHR(65) || CHR(68) || CHR(69) || CHR(83) || CHR(72));

