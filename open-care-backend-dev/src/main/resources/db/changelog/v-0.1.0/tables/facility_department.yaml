databaseChangeLog:
  - changeSet:
      id: create-facility-department-table
      author: sadman
      changes:
        - createTable:
            tableName: facility_department
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: domain
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  remarks: "HOSPITAL, INSTITUTION"

              - column:
                  name: domain_id
                  type: BIGINT
                  constraints:
                    nullable: false
                  remarks: "ID of hospital, institution, etc."

              - column:
                  name: department_id
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: head_profile_id
                  type: BIGINT

              - column:
                  name: phone
                  type: VARCHAR(50)

              - column:
                  name: email
                  type: VARCHAR(150)

              - column:
                  name: established_year
                  type: INT

              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: created_by
                  type: varchar(100)
                  defaultValue: 'admin'
                  constraints:
                    nullable: false
                  remarks: "User who created the record"

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: 'CURRENT_TIMESTAMP'
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was created"

              - column:
                  name: updated_by
                  type: varchar(100)
                  defaultValue: 'admin'
                  constraints:
                    nullable: false
                  remarks: "User who last updated the record"

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: 'CURRENT_TIMESTAMP'
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was last updated"

        - addForeignKeyConstraint:
            baseTableName: facility_department
            baseColumnNames: department_id
            referencedTableName: department
            referencedColumnNames: id
            constraintName: fk_facility_department_department

        - addForeignKeyConstraint:
            baseTableName: facility_department
            baseColumnNames: head_profile_id
            referencedTableName: profile
            referencedColumnNames: id
            constraintName: fk_facility_department_head_profile
