databaseChangeLog:
  - changeSet:
      id: create-doctor-workplace-table
      author: sadman
      changes:
        - createTable:
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: doctor_workplace_id_pk
                  remarks: "Primary key"

              - column:
                  name: doctor_id
                  type: int8
                  constraints:
                    nullable: false
                  remarks: "Reference to doctor"

              - column:
                  name: medical_speciality_id
                  type: int4
                  remarks: "Reference to medical specialty"

              - column:
                  name: doctor_position
                  type: varchar(100)
                  remarks: "Doctor's position (e.g., Consultant, Registrar)"

              - column:
                  name: teacher_position
                  type: varchar(100)
                  remarks: "Teaching position if applicable"

              - column:
                  name: institution_id
                  type: int4
                  remarks: "Reference to institution (for teaching roles)"

              - column:
                  name: hospital_id
                  type: int4
                  remarks: "Reference to hospital"

              - column:
                  name: start_date
                  type: date
                  remarks: "Start date of workplace"

              - column:
                  name: end_date
                  type: date
                  remarks: "End date (null if current)"

              - column:
                  name: is_active
                  type: boolean
                  defaultValue: true
                  constraints:
                    nullable: false
                  remarks: "Indicates if the doctor workplace is currently active"

              - column:
                  name: created_by
                  type: varchar(36)
                  defaultValue: 'system'
                  constraints:
                    nullable: false
                  remarks: "User/system who created the record"

              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was created"

              - column:
                  name: updated_by
                  type: varchar(36)
                  defaultValue: 'system'
                  constraints:
                    nullable: false
                  remarks: "User/system who last updated the record"

              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was last updated"
            tableName: doctor_workplace
        - addForeignKeyConstraint:
            baseColumnNames: doctor_id
            baseTableName: doctor_workplace
            constraintName: doctor_workplace_fk_doctor
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: doctor
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: medical_speciality_id
            baseTableName: doctor_workplace
            constraintName: doctor_workplace_fk_medical_speciality
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: medical_speciality
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: institution_id
            baseTableName: doctor_workplace
            constraintName: doctor_workplace_fk_institution
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: institution
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: hospital_id
            baseTableName: doctor_workplace
            constraintName: doctor_workplace_fk_hospital
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: hospital
            validate: true
        - addUniqueConstraint:
            tableName: doctor_workplace
            columnNames: doctor_id, hospital_id, doctor_position, is_active
            constraintName: uk_doctor_workplace_unique