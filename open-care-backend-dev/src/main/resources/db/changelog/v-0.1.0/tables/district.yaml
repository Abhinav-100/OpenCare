databaseChangeLog:
  - changeSet:
      id: create-district-table
      author: sadman
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: district_id_pk
                  name: id
                  type: serial
                  startWith: 66
                  remarks: "Primary key. Unique district identifier"
              - column:
                  constraints:
                    nullable: false
                  name: division_id
                  type: int4
                  remarks: "Foreign key to division"
              - column:
                  constraints:
                    nullable: false
                  name: name
                  type: varchar(100)
                  remarks: "District name in English"
              - column:
                  constraints:
                    nullable: false
                  name: bn_name
                  type: varchar(100)
                  remarks: "District name in Bangla"
              - column:
                  name: lat
                  type: numeric(12,9)
                  remarks: "Latitude coordinate for location"
              - column:
                  name: lon
                  type: numeric(12,9)
                  remarks: "Longitude coordinate for location"
              - column:
                  name: url
                  type: varchar(100)
                  remarks: "URL for district resource"
              - column:
                  name: geom
                  type: geometry(MULTIPOLYGON,4326)
                  remarks: "Geographical boundary (geometry)"
            tableName: district
        - addForeignKeyConstraint:
            baseColumnNames: division_id
            baseTableName: district
            constraintName: district_fk_division
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: division
            validate: true
        - createIndex:
            tableName: district
            indexName: idx_district_name
            columns:
              - column:
                  name: name