spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: opencare

  liquibase:
    enabled: false  # disable Liquibase if you don’t want migrations in tests

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://dummy/issuer  # dummy value for test

app:
  frontend:
    redirect-uri: http://localhost:3000/callback

logging:
  level:
    root: warn
