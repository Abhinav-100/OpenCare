databaseChangeLog:
  - changeSet:
      id: create-doctor-degree-table
      author: sadman
      changes:
        - createTable:
            tableName: doctor_degree
            remarks: "Stores academic degree records for doctors"
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: doctor_degree_id_pk
                  remarks: "Primary key identifier"
              - column:
                  name: doctor_id
                  type: int8
                  constraints:
                    nullable: false
                  remarks: "Reference to doctor"
              - column:
                  name: degree_id
                  type: int4
                  constraints:
                    nullable: false
                  remarks: "Reference to degree type"
              - column:
                  name: medical_speciality_id
                  type: int4
                  remarks: "Optional reference to medical speciality"
              - column:
                  name: institution_id
                  type: int4
                  constraints:
                    nullable: false
                  remarks: "Reference to awarding institution"
              - column:
                  name: start_date
                  type: date
                  remarks: "Program start date"
              - column:
                  name: end_date
                  type: date
                  remarks: "Program end date or graduation date"
              - column:
                  name: grade
                  type: varchar(50)
                  remarks: "Grade or classification"
              - column:
                  name: description
                  type: varchar(250)
                  remarks: "Additional description"
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
                  remarks: "Indicates if the degree record is active"
              - column:
                  name: created_by
                  type: varchar(100)
                  defaultValue: 'admin'
                  constraints:
                    nullable: false
                  remarks: "User/system who created the record"
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: 'CURRENT_TIMESTAMP'
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was created"
              - column:
                  name: updated_by
                  type: varchar(100)
                  defaultValue: 'admin'
                  constraints:
                    nullable: false
                  remarks: "User/system who last updated the record"
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: 'CURRENT_TIMESTAMP'
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was last updated"
        - addForeignKeyConstraint:
            baseColumnNames: doctor_id
            baseTableName: doctor_degree
            constraintName: doctor_degree_fk_doctor
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: doctor
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: medical_speciality_id
            baseTableName: doctor_degree
            constraintName: doctor_degree_fk_medical_speciality
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: medical_speciality
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: degree_id
            baseTableName: doctor_degree
            constraintName: doctor_degree_fk_degree
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: degree
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: institution_id
            baseTableName: doctor_degree
            constraintName: doctor_degree_fk_institution
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: institution
            validate: true
        - createIndex:
            tableName: doctor_degree
            indexName: idx_doctor_degree_doctor
            columns:
              - column:
                  name: doctor_id
        - createIndex:
            tableName: doctor_degree
            indexName: idx_doctor_degree_degree
            columns:
              - column:
                  name: degree_id
        - createIndex:
            tableName: doctor_degree
            indexName: idx_doctor_degree_speciality
            columns:
              - column:
                  name: medical_speciality_id
        - createIndex:
            tableName: doctor_degree
            indexName: idx_doctor_degree_institution
            columns:
              - column:
                  name: institution_id
        - createIndex:
            tableName: doctor_degree
            indexName: idx_doctor_degree_active
            columns:
              - column:
                  name: is_active