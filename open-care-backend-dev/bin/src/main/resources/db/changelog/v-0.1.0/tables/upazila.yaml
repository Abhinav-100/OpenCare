databaseChangeLog:
  - changeSet:
      id: create-upazila-table
      author: sadman
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: upazila_id_pk
                  name: id
                  type: serial
                  startWith: 493
                  remarks: "Primary key. Unique upazila identifier"
              - column:
                  constraints:
                    nullable: false
                  name: district_id
                  type: int4
                  remarks: "Foreign key to district"
              - column:
                  constraints:
                    nullable: false
                  name: name
                  type: varchar(100)
                  remarks: "Upazila name in English"
              - column:
                  constraints:
                    nullable: false
                  name: bn_name
                  type: varchar(100)
                  remarks: "Upazila name in Bangla"
              - column:
                  name: lat
                  type: numeric(12,9)
                  remarks: "Latitude coordinate for location"
              - column:
                  name: lon
                  type: numeric(12,9)
                  remarks: "Longitude coordinate for location"
              - column:
                  name: url
                  type: varchar(100)
                  remarks: "URL for upazila resource"
              - column:
                  name: geom
                  type: geometry(MULTIPOLYGON,4326)
                  remarks: "Geographical boundary (geometry)"
            tableName: upazila
        - addForeignKeyConstraint:
            baseColumnNames: district_id
            baseTableName: upazila
            constraintName: upazila_fk_district
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: district
            validate: true
        - createIndex:
            tableName: upazila
            indexName: idx_upazila_name
            columns:
              - column:
                  name: name