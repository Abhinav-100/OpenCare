databaseChangeLog:
  - changeSet:
      id: create-profile-table
      author: sadman
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: profile_id_pk
                  name: id
                  type: bigserial
                  startWith: 1242
              - column:
                  name: user_type
                  type: varchar(100)
              - column:
                  name: username
                  type: varchar(100)
              - column:
                  name: keycloak_user_id
                  type: varchar(100)
              - column:
                  name: phone
                  type: varchar(20)
              - column:
                  name: email
                  type: varchar(100)
              - column:
                  name: image_url
                  type: varchar(250)
              - column:
                  name: name
                  type: varchar(100)
              - column:
                  name: bn_name
                  type: varchar(100)
              - column:
                  name: gender
                  type: varchar(20)
              - column:
                  name: date_of_birth
                  type: date
              - column:
                  name: blood_group
                  type: varchar(15)
              - column:
                  name: address
                  type: varchar(512)
              - column:
                  name: facebook_profile_url
                  type: varchar(255)
              - column:
                  name: facebook_page_url
                  type: varchar(255)
              - column:
                  name: linkedin_profile_url
                  type: varchar(255)
              - column:
                  name: x_profile_url
                  type: varchar(255)
              - column:
                  name: research_gate_profile_url
                  type: varchar(255)
              - column:
                  name: instagram_profile_url
                  type: varchar(255)
              - column:
                  name: youtube_channel_url
                  type: varchar(255)
              - column:
                  name: website_url
                  type: varchar(255)
              - column:
                  name: blog_url
                  type: varchar(255)
              - column:
                  name: district_id
                  type: int4
              - column:
                  name: upazila_id
                  type: int4
              - column:
                  name: union_id
                  type: int4
              - column:
                  name: contribution_points
                  type: int4
              - column:
                  constraints:
                    nullable: false
                  name: is_blood_donor
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: blood_donation_count
                  type: int4
              - column:
                  name: last_blood_donation_date
                  type: timestamp
              - column:
                  constraints:
                      nullable: false
                  name: is_volunteer
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: health_data_consent
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  constraints:
                    nullable: false
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
              - column:
                  constraints:
                    nullable: false
                  name: created_by
                  type: varchar(100)
                  defaultValue: 'admin'
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: timestamp
                  defaultValueComputed: 'CURRENT_TIMESTAMP'
              - column:
                  constraints:
                    nullable: false
                  name: updated_by
                  type: varchar(100)
                  defaultValue: 'admin'
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: 'CURRENT_TIMESTAMP'
            tableName: profile

        - addForeignKeyConstraint:
            baseColumnNames: district_id
            baseTableName: profile
            constraintName: profile_fk_district
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: district
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: upazila_id
            baseTableName: profile
            constraintName: profile_fk_upazila
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: upazila
            validate: true
        - addForeignKeyConstraint:
            baseColumnNames: union_id
            baseTableName: profile
            constraintName: profile_fk_union
            deferrable: false
            initiallyDeferred: false
            onUpdate: CASCADE
            referencedColumnNames: id
            referencedTableName: union
            validate: true

        - addUniqueConstraint:
            columnNames: username
            constraintName: uq_profile_username
            tableName: profile
        - addUniqueConstraint:
            columnNames: phone
            constraintName: uq_profile_phone
            tableName: profile
        - addUniqueConstraint:
            columnNames: email
            constraintName: uq_profile_email
            tableName: profile
        - createIndex:
            tableName: profile
            indexName: idx_profile_user_type
            columns:
              - column:
                  name: user_type
        - createIndex:
            tableName: profile
            indexName: idx_profile_name
            columns:
              - column:
                  name: name
        - createIndex:
            tableName: profile
            indexName: idx_profile_district
            columns:
              - column:
                  name: district_id
        - createIndex:
            tableName: profile
            indexName: idx_profile_upazila
            columns:
              - column:
                  name: upazila_id
        - createIndex:
            tableName: profile
            indexName: idx_profile_union
            columns:
              - column:
                  name: union_id
        - createIndex:
            tableName: profile
            indexName: idx_profile_blood_donor
            columns:
              - column:
                  name: is_blood_donor
              - column:
                  name: blood_group
              - column:
                  name: district_id
              - column:
                  name: upazila_id
              - column:
                  name: union_id
        - createIndex:
            tableName: profile
            indexName: idx_profile_volunteer
            columns:
              - column:
                  name: is_volunteer
              - column:
                  name: district_id
              - column:
                  name: upazila_id
              - column:
                  name: union_id
        - createIndex:
            tableName: profile
            indexName: idx_profile_active
            columns:
              - column:
                  name: is_active