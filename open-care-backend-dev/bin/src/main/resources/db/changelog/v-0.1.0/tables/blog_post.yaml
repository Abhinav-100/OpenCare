databaseChangeLog:
  - changeSet:
      id: create-blog-category-table
      author: sadman
      changes:
        - createTable:
            tableName: blog_category
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    primaryKeyName: blog_category_pk
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(120)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: text
              - column:
                  name: category_image
                  type: varchar(500)
              - column:
                  name: color_code
                  type: varchar(7)
              - column:
                  name: sort_order
                  type: integer
                  defaultValue: 0
              - column:
                  name: meta_title
                  type: varchar(255)
              - column:
                  name: meta_description
                  type: text
              - column:
                  name: is_active
                  type: boolean
                  defaultValue: true
                  constraints:
                    nullable: false
                  remarks: "Indicates if the association is currently active"

              - column:
                  name: created_by
                  type: varchar(36)
                  defaultValue: 'system'
                  constraints:
                    nullable: false
                  remarks: "User/system who created the record"

              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was created"

              - column:
                  name: updated_by
                  type: varchar(36)
                  defaultValue: 'system'
                  constraints:
                    nullable: false
                  remarks: "User/system who last updated the record"

              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was last updated"

  - changeSet:
      id: create-blog-post-table
      author: sadman
      changes:
        - createTable:
            tableName: blog_post
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    primaryKeyName: blog_post_pk
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(300)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: excerpt
                  type: text
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: feature_image
                  type: varchar(500)
              - column:
                  name: feature_image_alt
                  type: varchar(255)
              - column:
                  name: meta_title
                  type: varchar(255)
              - column:
                  name: meta_description
                  type: text
              - column:
                  name: author_id
                  type: int8
                  constraints:
                    nullable: false
              - column:
                  name: primary_category_id
                  type: int8
              - column:
                  name: speciality_id
                  type: int8
              - column:
                  name: published_at
                  type: timestamp
              - column:
                  name: scheduled_at
                  type: timestamp
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: 'DRAFT'
                  constraints:
                    nullable: false
              - column:
                  name: visibility
                  type: varchar(20)
                  defaultValue: 'PUBLIC'
                  constraints:
                    nullable: false
              - column:
                  name: is_featured
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: is_trending
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: reading_time
                  type: integer
                  defaultValue: 0
              - column:
                  name: view_count
                  type: integer
                  defaultValue: 0
              - column:
                  name: like_count
                  type: integer
                  defaultValue: 0
              - column:
                  name: share_count
                  type: integer
                  defaultValue: 0
              - column:
                  name: comment_count
                  type: integer
                  defaultValue: 0
              - column:
                  name: allow_comments
                  type: boolean
                  defaultValueBoolean: true
              - column:
                  name: is_active
                  type: boolean
                  defaultValue: true
                  constraints:
                    nullable: false
                  remarks: "Indicates if the association is currently active"

              - column:
                  name: created_by
                  type: varchar(36)
                  defaultValue: 'system'
                  constraints:
                    nullable: false
                  remarks: "User/system who created the record"

              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was created"

              - column:
                  name: updated_by
                  type: varchar(36)
                  defaultValue: 'system'
                  constraints:
                    nullable: false
                  remarks: "User/system who last updated the record"

              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Timestamp when record was last updated"

        - addForeignKeyConstraint:
            baseColumnNames: author_id
            baseTableName: blog_post
            constraintName: blog_post_fk_author
            referencedColumnNames: id
            referencedTableName: profile
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseColumnNames: primary_category_id
            baseTableName: blog_post
            constraintName: blog_post_fk_primary_category
            referencedColumnNames: id
            referencedTableName: blog_category
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseColumnNames: speciality_id
            baseTableName: blog_post
            constraintName: blog_post_fk_speciality
            referencedColumnNames: id
            referencedTableName: medical_speciality
            onUpdate: CASCADE

  - changeSet:
      id: create-blog-post-category-table
