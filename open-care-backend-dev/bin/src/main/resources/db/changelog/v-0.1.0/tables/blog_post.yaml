            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: blog_post_category
            constraintName: blog_post_category_fk_category
            referencedColumnNames: id
            referencedTableName: blog_category
            onUpdate: CASCADE

