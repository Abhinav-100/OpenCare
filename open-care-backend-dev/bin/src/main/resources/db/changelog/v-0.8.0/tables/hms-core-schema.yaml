        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_user_roles_role
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: patients
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_patients_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: doctors
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_doctors_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_appointments_patient
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: doctor_id
            referencedTableName: doctors
            referencedColumnNames: id
            constraintName: fk_appointments_doctor
            onDelete: RESTRICT

        - addForeignKeyConstraint:
            baseTableName: lab_tests
            baseColumnNames: appointment_id
            referencedTableName: appointments
            referencedColumnNames: id
            constraintName: fk_lab_tests_appointment
