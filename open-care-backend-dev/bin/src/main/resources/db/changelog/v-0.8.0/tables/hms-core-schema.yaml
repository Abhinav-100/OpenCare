              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: doctor_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
