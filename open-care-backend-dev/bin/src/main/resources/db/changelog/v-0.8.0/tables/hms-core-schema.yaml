                  name: reason
                  type: TEXT
              - column:
                  name: diagnosis
                  type: TEXT
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: cancellation_reason
                  type: TEXT
              - column:
                  name: cancelled_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: appointments
            columnNames: patient_id, doctor_id, scheduled_at
            constraintName: uk_appointments_patient_doctor_time

        - createTable:
            tableName: lab_tests
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
                    primaryKeyName: lab_tests_pk
              - column:
                  name: appointment_id
                  type: BIGINT
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: doctor_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: test_code
                  type: VARCHAR(40)
                  constraints:
                    nullable: false
              - column:
                  name: test_name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: REQUESTED
                  constraints:
                    nullable: false
              - column:
                  name: requested_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: sample_collected_at
                  type: TIMESTAMP
              - column:
                  name: completed_at
                  type: TIMESTAMP
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: reports
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
                    primaryKeyName: reports_pk
              - column:
                  name: lab_test_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_by_user_id
                  type: BIGINT
              - column:
                  name: report_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_url
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: summary
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: AVAILABLE
                  constraints:
                    nullable: false
              - column:
                  name: reported_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: bills
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
                    primaryKeyName: bills_pk
              - column:
                  name: bill_number
                  type: VARCHAR(40)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_bills_number
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: appointment_id
                  type: BIGINT
              - column:
                  name: bill_date
                  type: DATE
                  defaultValueComputed: CURRENT_DATE
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: NUMERIC(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: discount_amount
                  type: NUMERIC(10,2)
                  defaultValueNumeric: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: tax_amount
                  type: NUMERIC(10,2)
                  defaultValueNumeric: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: net_amount
                  type: NUMERIC(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: UNPAID
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
