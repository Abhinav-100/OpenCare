        - addForeignKeyConstraint:
            baseTableName: lab_tests
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_lab_tests_patient
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: lab_tests
            baseColumnNames: doctor_id
            referencedTableName: doctors
            referencedColumnNames: id
            constraintName: fk_lab_tests_doctor
            onDelete: RESTRICT

        - addForeignKeyConstraint:
            baseTableName: reports
            baseColumnNames: lab_test_id
            referencedTableName: lab_tests
            referencedColumnNames: id
            constraintName: fk_reports_lab_test
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: reports
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_reports_patient
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: reports
            baseColumnNames: uploaded_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reports_uploaded_by
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableName: bills
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_bills_patient
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: bills
            baseColumnNames: appointment_id
            referencedTableName: appointments
            referencedColumnNames: id
            constraintName: fk_bills_appointment
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: bill_id
            referencedTableName: bills
            referencedColumnNames: id
            constraintName: fk_payments_bill
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: paid_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_payments_paid_by
            onDelete: SET NULL

        - createIndex:
            tableName: users
            indexName: idx_users_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: user_roles
            indexName: idx_user_roles_role
            columns:
              - column:
                  name: role_id

        - createIndex:
            tableName: doctors
            indexName: idx_doctors_specialization
            columns:
              - column:
                  name: specialization

        - createIndex:
            tableName: doctors
            indexName: idx_doctors_department
            columns:
              - column:
                  name: department

        - createIndex:
            tableName: appointments
            indexName: idx_appointments_patient
            columns:
              - column:
                  name: patient_id

        - createIndex:
            tableName: appointments
            indexName: idx_appointments_doctor
            columns:
              - column:
                  name: doctor_id

        - createIndex:
            tableName: appointments
            indexName: idx_appointments_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: appointments
            indexName: idx_appointments_scheduled_at
            columns:
              - column:
                  name: scheduled_at

        - createIndex:
            tableName: lab_tests
            indexName: idx_lab_tests_patient_status
            columns:
              - column:
                  name: patient_id
              - column:
                  name: status

        - createIndex:
            tableName: lab_tests
            indexName: idx_lab_tests_appointment
            columns:
              - column:
                  name: appointment_id

        - createIndex:
            tableName: reports
            indexName: idx_reports_patient
            columns:
              - column:
                  name: patient_id

        - createIndex:
            tableName: reports
            indexName: idx_reports_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: bills
            indexName: idx_bills_patient_status
            columns:
              - column:
                  name: patient_id
              - column:
                  name: status

        - createIndex:
            tableName: bills
            indexName: idx_bills_bill_date
            columns:
              - column:
                  name: bill_date

        - createIndex:
            tableName: payments
            indexName: idx_payments_bill
            columns:
              - column:
                  name: bill_id

        - createIndex:
            tableName: payments
            indexName: idx_payments_status
            columns:
              - column:
                  name: payment_status

        - createIndex:
            tableName: payments
            indexName: idx_payments_paid_at
            columns:
              - column:
                  name: paid_at

        - sql:
            dbms: postgresql
            sql: |
              ALTER TABLE users
                ADD CONSTRAINT chk_users_status
                CHECK (status IN ('ACTIVE', 'INACTIVE', 'SUSPENDED'));

              ALTER TABLE patients
                ADD CONSTRAINT chk_patients_gender
                CHECK (gender IN ('MALE', 'FEMALE', 'OTHER'));

              ALTER TABLE doctors
                ADD CONSTRAINT chk_doctors_experience
                CHECK (years_experience >= 0),
                ADD CONSTRAINT chk_doctors_fee
                CHECK (consultation_fee >= 0);

              ALTER TABLE appointments
                ADD CONSTRAINT chk_appointments_duration
                CHECK (duration_minutes > 0),
                ADD CONSTRAINT chk_appointments_status
                CHECK (status IN ('PENDING', 'CONFIRMED', 'COMPLETED', 'CANCELLED', 'NO_SHOW'));

              ALTER TABLE lab_tests
                ADD CONSTRAINT chk_lab_tests_status
                CHECK (status IN ('REQUESTED', 'SAMPLE_COLLECTED', 'IN_PROGRESS', 'COMPLETED', 'CANCELLED'));

              ALTER TABLE reports
                ADD CONSTRAINT chk_reports_status
                CHECK (status IN ('AVAILABLE', 'AMENDED', 'RETRACTED'));

              ALTER TABLE bills
                ADD CONSTRAINT chk_bills_amounts
                CHECK (
                  total_amount >= 0 AND
                  discount_amount >= 0 AND
                  tax_amount >= 0 AND
                  net_amount >= 0
                ),
                ADD CONSTRAINT chk_bills_status
                CHECK (status IN ('UNPAID', 'PARTIAL', 'PAID', 'VOID'));

              ALTER TABLE payments
                ADD CONSTRAINT chk_payments_amount
                CHECK (amount > 0),
                ADD CONSTRAINT chk_payments_status
                CHECK (payment_status IN ('PENDING', 'SUCCESS', 'FAILED', 'REFUNDED'));
