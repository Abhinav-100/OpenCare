              - column:
                  name: bill_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: paid_by_user_id
                  type: BIGINT
              - column:
                  name: payment_reference
                  type: VARCHAR(100)
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_payments_reference
              - column:
                  name: amount
                  type: NUMERIC(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: payment_status
                  type: VARCHAR(20)
                  defaultValue: SUCCESS
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: gateway
                  type: VARCHAR(50)
              - column:
                  name: gateway_txn_id
                  type: VARCHAR(120)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_roles_user
