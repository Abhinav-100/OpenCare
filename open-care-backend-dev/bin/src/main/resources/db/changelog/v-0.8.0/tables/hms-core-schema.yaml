                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_patients_user_id
              - column:
                  name: mrn
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_patients_mrn
              - column:
                  name: date_of_birth
                  type: DATE
              - column:
                  name: gender
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: blood_group
                  type: VARCHAR(5)
              - column:
                  name: address
                  type: TEXT
              - column:
                  name: emergency_contact_name
                  type: VARCHAR(120)
              - column:
                  name: emergency_contact_phone
                  type: VARCHAR(20)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
